<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sketch_apr28a | Arduino IDE 2.3.7</title>
  <style>
    :root{
      --titlebar:#e8e3dc;
      --menu-bg:#ffffff;
      --toolbar:#006d70;
      --sidebar:#dfe5e4;
      --sidebar-border:#cfd6d5;
      --editor-bg:#ffffff;
      --code-bg:#f8f8f8;
      --line-blue:#2e78b8;
      --keyword:#0b9db0;
      --comment:#95a2a6;
      --orange:#d68033;
      --status:#006d70;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#fff;
      font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body{
      display:flex;
      flex-direction:column;
    }

    /* ================= TITLE BAR ================= */
    .titlebar{
      height:26px;
      background:var(--titlebar);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 8px 0 4px;
      border-bottom:1px solid #d7d2cb;
      flex-shrink:0;
    }

    .titlebar-left{
      display:flex;
      align-items:center;
      gap:8px;
      color:#222;
      font-size:13px;
    }

    .app-icon{
      width:16px;
      height:16px;
      border-radius:4px;
      background:#2aa6a6;
      position:relative;
      flex-shrink:0;
    }

    .app-icon::before{
      content:"∞";
      position:absolute;
      top:-2px;
      left:2px;
      color:#fff;
      font-size:12px;
      font-weight:700;
      line-height:16px;
    }

    .window-actions{
      display:flex;
      align-items:center;
      gap:18px;
      font-size:14px;
      color:#333;
      user-select:none;
    }

    /* ================= MENU BAR ================= */
    .menubar{
      height:28px;
      background:var(--menu-bg);
      border-bottom:1px solid #e2e2e2;
      display:flex;
      align-items:center;
      gap:16px;
      padding:0 6px;
      flex-shrink:0;
    }

    .menu-item{
      font-size:13px;
      color:#222;
      cursor:pointer;
      user-select:none;
    }

    .menu-item:hover{
      color:#006d70;
    }

    /* ================= TOP TOOLBAR ================= */
    .toolbar{
      height:46px;
      background:var(--toolbar);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 12px;
      flex-shrink:0;
    }

    .toolbar-left{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .circle-btn{
      width:32px;
      height:32px;
      border-radius:50%;
      background:#7bc9c8;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#0b5f61;
      cursor:pointer;
      user-select:none;
      flex-shrink:0;
    }

    .circle-btn svg{
      width:18px;
      height:18px;
      stroke:#0b5f61;
      fill:none;
      stroke-width:2.1;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .board-select{
      width:255px;
      height:32px;
      background:#fff;
      border-radius:2px;
      margin-left:8px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 12px;
      font-size:14px;
      color:#616161;
      user-select:none;
    }

    .toolbar-right{
      display:flex;
      align-items:center;
      gap:18px;
      color:#e6f7f7;
      user-select:none;
    }

    .toolbar-right svg{
      width:22px;
      height:22px;
      stroke:#e6f7f7;
      fill:none;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    /* ================= APP BODY ================= */
    .app{
      flex:1;
      display:flex;
      min-height:0;
      min-width:0;
    }

    /* ================= LEFT SIDEBAR ================= */
    .sidebar{
      width:52px;
      background:var(--sidebar);
      border-right:1px solid var(--sidebar-border);
      display:flex;
      flex-direction:column;
      align-items:center;
      position:relative;
      flex-shrink:0;
    }

    .side-btn{
      width:100%;
      height:56px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
    }

    .side-btn svg{
      width:28px;
      height:28px;
      stroke:#a1aaaa;
      fill:none;
      stroke-width:1.8;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .side-btn:hover svg{
      stroke:#7f8a8a;
    }

    .bottom-user{
      position:absolute;
      bottom:10px;
      width:100%;
    }

    /* ================= RIGHT EDITOR AREA ================= */
    .editor-shell{
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
      min-height:0;
      background:#fff;
    }

    .tabbar{
      height:34px;
      border-bottom:1px solid #e6e6e6;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 8px;
      flex-shrink:0;
    }

    .tab-title{
      font-size:14px;
      color:#444;
    }

    .tab-more{
      color:#666;
      font-size:22px;
      line-height:1;
      user-select:none;
    }

    .editor{
      flex:1;
      display:flex;
      min-height:0;
      min-width:0;
      background:#fff;
    }

    .line-numbers{
      width:74px;
      flex-shrink:0;
      background:#fff;
      color:var(--line-blue);
      text-align:right;
      padding-right:18px;
      padding-top:8px;
      font-size:14px;
      line-height:1.5;
      user-select:none;
      white-space:pre;
    }

    .code-panel{
      flex:1;
      min-width:0;
      background:var(--code-bg);
      border-left:1px solid #efefef;
      position:relative;
      padding-top:8px;
      font-family:Consolas, "Courier New", monospace;
      font-size:14px;
      line-height:1.5;
      color:#333;
      overflow:auto;
      white-space:pre;
    }

    .cursor{
      position:absolute;
      top:8px;
      left:0;
      width:2px;
      height:20px;
      background:#18a4a7;
    }

    .code{
      min-width:max-content;
      padding-left:0;
    }

    .kw{ color:var(--keyword); }
    .comment{ color:var(--comment); }
    .orange{ color:var(--orange); }

    /* ================= STATUS BAR ================= */
    .statusbar{
      height:28px;
      background:var(--status);
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:18px;
      padding:0 12px;
      color:#fff;
      font-size:12px;
      flex-shrink:0;
      user-select:none;
    }

    /* prevent accidental blue selection */
    .no-select{
      -webkit-user-select:none;
      -ms-user-select:none;
      user-select:none;
    }
  </style>
</head>
<body>

  <!-- TITLE BAR -->

</body>
</html>
